x-app-env: &app-env
  DATABASE_URL: postgresql://media:media@postgres:5432/media_processor?schema=public
  REDIS_HOST: redis
  REDIS_PORT: 6379
  AWS_REGION: ap-northeast-2
  S3_BUCKET: my-media-bucket
  S3_ENDPOINT: http://minio:9000
  S3_FORCE_PATH_STYLE: "true"
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  WEBHOOK_HMAC_SECRET: local-dev-secret

x-app-build: &app-build
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio-init:
      condition: service_completed_successfully

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: media
      POSTGRES_PASSWORD: media
      POSTGRES_DB: media_processor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media -d media_processor"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/my-media-bucket || true
      "

  migrate:
    <<: *app-build
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      WORKER_ROLE: api
    command: npx prisma db push --skip-generate
    restart: "no"

  api:
    <<: *app-build
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *app-env
      WORKER_ROLE: api
      PORT: 3000
    ports:
      - "3000:3000"

  worker-ingest:
    <<: *app-build
    environment:
      <<: *app-env
      WORKER_ROLE: ingest

  worker-transcode-1080p:
    <<: *app-build
    environment:
      <<: *app-env
      WORKER_ROLE: transcode-1080p

  worker-transcode-720p:
    <<: *app-build
    environment:
      <<: *app-env
      WORKER_ROLE: transcode-720p

  worker-thumbnail:
    <<: *app-build
    environment:
      <<: *app-env
      WORKER_ROLE: thumbnail

  worker-finalize:
    <<: *app-build
    environment:
      <<: *app-env
      WORKER_ROLE: finalize

  worker-webhook:
    <<: *app-build
    environment:
      <<: *app-env
      WORKER_ROLE: webhook

volumes:
  postgres-data:
  redis-data:
  minio-data:
